    }
  ],

  "notes": "string - any important quote notes",
  "standards": ["list of standards mentioned: ASME B31.3, API 6D, etc."],
  "warnings": ["critical issues with this quote that need attention"]
}

Be thorough with specs - extract every technical detail. If info is missing, add it to flags.`;

      const userMsg = `Extract all data from this vendor quote PDF. Project context: ${projectInfo}`;

      const apiKey = localStorage.getItem("jcf_anthropic_key");
      if (!apiKey) throw new Error("API Key missing. Please reset the app.");

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-cors-bypass": "true" // Required if running directly from a browser without a proxy
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          system: systemPrompt,
          messages: [{
            role: "user",
            content: [
              { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64PDF } },
              { type: "text", text: userMsg }
            ]
          }]
        })
      });

      if (!response.ok) throw new Error(`API error: ${response.status}`);
      const data = await response.json();
      const text = data.content.find(b => b.type === "text")?.text || "";
      const clean = text.replace(/```json|```/g, "").trim();
      return JSON.parse(clean);
    }

                    </div>
                    <div className="field">
                      <label>Country *</label>
                      <input placeholder="e.g. CAN, USA" value={form.country} onChange={e => set("country", e.target.value)} />
                    </div>
                  </div>
                  <div className="grid-3" style={{ marginBottom: 16 }}>
                    <div className="field">
                      <label>Project Name</label>
                      <input placeholder="e.g. Fort McMurray Expansion Phase 2" value={form.projectName} onChange={e => set("projectName", e.target.value)} />
                    </div>
                  </div>
                  <div className="grid-3">
                    <div className="field">
                      <label>Attention / Contact</label>
                      <input placeholder="e.g. John Smith" value={form.contactName} onChange={e => set("contactName", e.target.value)} />
                    </div>
                    <div className="field">
                      <label>PO / RFQ #</label>
                      <input placeholder="e.g. RFQ-2026-0045" value={form.poNumber} onChange={e => set("poNumber", e.target.value)} />
                    </div>
                    <div className="field">
                      <label>Internal Notes</label>
                      <input placeholder="Optional internal note" value={form.notes} onChange={e => set("notes", e.target.value)} />
                    </div>
                  </div>
                </div>
              </div>

              {/* ── Step 2: PDF Upload ── */}
              <div className="card">
                <div className="card-header">
                  <div className="card-header-icon">②</div>
                  <h3>Vendor Quote PDF</h3>
                  <span>Drop your supplier quote — AI will extract all data</span>
                </div>
                <div className="card-body">
                  <div
                    className={`drop-zone ${dragging ? "drag-over" : ""} ${pdfFile ? "has-file" : ""}`}
                    onDragOver={e => { e.preventDefault(); setDragging(true); }}
                    onDragLeave={() => setDragging(false)}
                    onDrop={onDrop}
                    onClick={() => !pdfFile && fileRef.current.click()}
                  >
                    <input ref={fileRef} type="file" accept="application/pdf" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />
                    {pdfFile ? (
                      <>
                        <span className="drop-icon">✅</span>
                        <div className="drop-title">PDF LOADED</div>
                        <div className="drop-file-info">
                          📄 {pdfFile.name} ({(pdfFile.size / 1024).toFixed(1)} KB)
                          <button className="drop-file-remove" onClick={e => { e.stopPropagation(); setPdfFile(null); setPdfBase64(null); setEstimate(null); }}>✕</button>
                        </div>
                      </>
                    ) : (
                      <>
                        <span className="drop-icon">📄</span>
                        <div className="drop-title">DROP PDF HERE</div>
                        <div className="drop-sub">or click to browse · Vendor quote, RFQ response, or price list</div>
                      </>
                    )}
                  </div>
                </div>
              </div>

              {/* ── Step 3: Pricing Config ── */}
              <div className="card">
                <div className="card-header">
                  <div className="card-header-icon">③</div>
                  <h3>Pricing Configuration</h3>
                  <span>Markup & currency settings</span>
                </div>
                <div className="card-body" style={{ display: "flex", gap: 32, flexWrap: "wrap", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 11, fontFamily: "'DM Mono', monospace", letterSpacing: "1.5px", textTransform: "uppercase", color: "var(--mid)", marginBottom: 8 }}>Markup Percentage</div>
                    <div className="markup-input-wrap">
                      <input type="number" min="0" max="200" value={form.markup} onChange={e => set("markup", e.target.value)} />
                      <div className="markup-unit">%</div>
                    </div>
                    <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 6 }}>Applied to all line items, freight & fees</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, fontFamily: "'DM Mono', monospace", letterSpacing: "1.5px", textTransform: "uppercase", color: "var(--mid)", marginBottom: 8 }}>Output Currency</div>
                    <div className="currency-row">
                      {["USD", "CAD", "EUR"].map(c => (
                        <button key={c} className={`currency-btn ${form.currency === c ? "active" : ""}`} onClick={() => set("currency", c)}>{c}</button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              {/* ── Generate Button ── */}
              {!estimate && (
                <button className="gen-btn" onClick={generate} disabled={loading || !pdfBase64 || !form.clientName || !form.country}>
                  {loading ? <><span className="spinner" /> Processing...</> : <>⚡ GENERATE CLIENT ESTIMATE</>}
                  {!loading && <div className="gen-btn-shine" />}
                </button>
              )}

              {/* ── Loading ── */}
              {loading && <LoadingState step={loadStep} />}

              {/* ── Output ── */}
              {estimate && !loading && (
                <>
                  <div style={{ height: 32 }} />
                  <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, color: "white", letterSpacing: 3, marginBottom: 16 }}>
                    ✓ ESTIMATE GENERATED
                  </div>
                  <EstimateDisplay estimate={estimate} form={form} />
                  <div style={{ marginTop: 24 }}>
                    <button className="btn-secondary btn-outline-white" onClick={() => { setEstimate(null); setLoadStep(0); }}>
                      ← Generate New Estimate
                    </button>
                  </div>
                </>
              )}
            </main>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
